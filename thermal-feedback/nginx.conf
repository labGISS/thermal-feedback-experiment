server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Redirect bare /cube2 → /cube2/
    location = /cube2 {
        return 301 /cube2/;
    }

    # Proxy API requests to the API service (strips /cube2/api prefix)
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Serve static assets with long cache headers
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA routing under /cube2/ → upstream application
    location /cube2/ {
        proxy_pass http://172.16.228.115:80/;

        # Required for WebSockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Pass client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Optional timeouts
        proxy_read_timeout 86400s;
    }
}
