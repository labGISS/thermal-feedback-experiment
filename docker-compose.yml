services:

  api:
    build:
      context: ./thermal-feedback-api
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database across container restarts
      - api-db:/app/data
    environment:
      - DB_PATH=/app/data/thermal_feedback.db
    restart: unless-stopped

  frontend:
    build:
      context: ./thermal-feedback
      args:
        # Use the nginx reverse proxy path so browser requests never cross origins.
        # Nginx already proxies /cube2/api/ → the api container on port 8000.
        VITE_API_URL: /cube2/api
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  api-db:
